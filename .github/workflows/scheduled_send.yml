name: Scheduled Send

on:
  schedule:
    # 毎日 UTC 23:56 = JST 翌8:56
    - cron: '56 23 * * *'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: |
          mkdir -p credentials
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > credentials/service-account-key.json
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Run scheduled sender
        env:
          KMT_SMTP_PASSWORD: ${{ secrets.KMT_SMTP_PASSWORD }}
        run: python3 scheduled_sender.py
